<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Playwright Locator Assistant</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <div class="section">
            <div class="button-group button-group--pick">
                <button id="pickElementButton" class="btn btn-primary">Pick Element</button>
            </div>
            <p id="locatorListEmpty" class="locator-list-empty">Pick an element to see up to five locator options (role, label, test id, CSS, etc.).</p>
            <ul id="locatorList" class="locator-list" aria-label="Locator strategies for the last picked element"></ul>
        </div>

        <div class="section section--eval">
            <h2 class="section-title">Evaluate locator</h2>
            <textarea id="evalLocatorInput" class="eval-locator-textbox" rows="5" placeholder="css selector or page.locator('#id')" spellcheck="false" aria-label="Locator to evaluate"></textarea>
            <button type="button" id="evalLocatorButton" class="btn btn-eval">Evaluate</button>
            <div id="evalLocatorMessage" class="eval-message" role="status" aria-live="polite"></div>
        </div>

        <div class="section section--shortcut">
            <div class="shortcut-header-row">
                <h2 class="section-title section-title--shortcut">Shortcut</h2>
                <div class="shortcut-header-controls">
                    <kbd id="shortcutBinding" class="shortcut-kbd" aria-live="polite">—</kbd>
                    <button type="button" id="editShortcutButton" class="btn btn-edit-shortcut">Edit</button>
                </div>
            </div>
            <p class="shortcut-hint" id="shortcutHint"></p>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
